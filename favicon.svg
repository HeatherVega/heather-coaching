<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Blue Morpho butterfly">
  <defs>
    <linearGradient id="morpho" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9FDBF6"/>
      <stop offset="45%" stop-color="#2F7CC6"/>
      <stop offset="100%" stop-color="#0E2A57"/>
    </linearGradient>
    <linearGradient id="morphoEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1F3D"/>
      <stop offset="100%" stop-color="#06122A"/>
    </linearGradient>
  </defs>

  <!-- Upper wings (forewings) -->
  <path d="M32 28 C 22 4, 4 6, 4 22 C 4 32, 20 33, 32 30 Z" fill="url(#morpho)" stroke="url(#morphoEdge)" stroke-width="1.2" stroke-linejoin="round"/>
  <path d="M32 28 C 42 4, 60 6, 60 22 C 60 32, 44 33, 32 30 Z" fill="url(#morpho)" stroke="url(#morphoEdge)" stroke-width="1.2" stroke-linejoin="round"/>

  <!-- Lower wings (hindwings) -->
  <path d="M32 32 C 22 38, 12 52, 24 58 C 32 58, 32 46, 32 32 Z" fill="url(#morpho)" stroke="url(#morphoEdge)" stroke-width="1.2" stroke-linejoin="round"/>
  <path d="M32 32 C 42 38, 52 52, 40 58 C 32 58, 32 46, 32 32 Z" fill="url(#morpho)" stroke="url(#morphoEdge)" stroke-width="1.2" stroke-linejoin="round"/>

  <!-- Subtle inner highlight on upper wings -->
  <path d="M22 18 C 16 16, 12 20, 14 24" stroke="#BDE6FA" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M42 18 C 48 16, 52 20, 50 24" stroke="#BDE6FA" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Body -->
  <ellipse cx="32" cy="34" rx="1.8" ry="12" fill="#0A1A2E"/>

  <!-- Antennae -->
  <path d="M30.5 23 Q 27 16 24 13" stroke="#0A1A2E" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <path d="M33.5 23 Q 37 16 40 13" stroke="#0A1A2E" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <circle cx="24" cy="13" r="0.9" fill="#0A1A2E"/>
  <circle cx="40" cy="13" r="0.9" fill="#0A1A2E"/>
</svg>
